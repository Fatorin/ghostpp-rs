# =====================================================================
# GHost++ Rust language file (Traditional Chinese) -- mirrors C++ GHost's language.cfg.
#
#   Format: key = "message template"; template placeholders use the {name} form, replaced by the program at runtime.
#   This is the language file loaded by default (bot_language in config/ghost.toml points to this file),
#   with behavior identical to before the rewrite. To switch languages: copy this file and re-translate, or switch to config/language_en.toml.
#
#   Note: a few messages broadcast to battle.net / modified clients deliberately stay in English
#   (load time, desync warnings, game-creation broadcasts, close replies), because some modified maps
#   / clients use these English strings as triggers for things like auto-join, and translating them may break compatibility.
#
#   The key set must be exactly identical to the built-in defaults (src/lang.rs) and language_en.toml.
# =====================================================================

