# =====================================================================
# GHost++ Rust language file (English) — counterpart of C++ GHost's language.cfg.
#
#   Format: key = "template"; placeholders use the {name} form and are
#   substituted at runtime. This file is identical to the built-in English
#   defaults in src/lang.rs. To use it, set in config/ghost.toml:
#       bot_language = "config/language_en.toml"
#
#   The key set MUST stay identical to the built-in defaults (src/lang.rs)
#   and to config/language.toml.
# =====================================================================

